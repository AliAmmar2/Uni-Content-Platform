<section class="reset-password">

  <div class="reset-password-card">

    <div class="reset-password-card__logo">
      <img
        src="../assets/imgs/logo.png"
        alt="Lebanese University"
      />

      <h2>Lebanese University</h2>
    </div>

    <h1>Reset Password</h1>

    <p class="reset-password-card__subtitle">
      Create a new password for your student account.
    </p>

    <form
      class="reset-password-form"
      [formGroup]="form"
      (ngSubmit)="submit()"
    >

      <div class="form-group">

        <label>New Password</label>

        <div class="input-wrapper">

          <fa-icon [icon]="['fas', 'lock']"></fa-icon>

          <input
            [type]="hideNewPassword ? 'password' : 'text'"
            placeholder="Enter your new password"
            formControlName="newPassword"
            autocomplete="new-password"
          />

          <button
            type="button"
            class="password-toggle"
            (click)="toggleNewPassword()"
          >
            <fa-icon
              [icon]="['far', hideNewPassword ? 'eye' : 'eye-slash']"
            ></fa-icon>
          </button>

        </div>

      </div>

      <div class="form-group">

        <label>Confirm Password</label>

        <div class="input-wrapper">

          <fa-icon [icon]="['fas', 'lock']"></fa-icon>

          <input
            [type]="hideConfirmPassword ? 'password' : 'text'"
            placeholder="Confirm your new password"
            formControlName="confirmPassword"
            autocomplete="new-password"
          />

          <button
            type="button"
            class="password-toggle"
            (click)="toggleConfirmPassword()"
          >
            <fa-icon
              [icon]="['far', hideConfirmPassword ? 'eye' : 'eye-slash']"
            ></fa-icon>
          </button>

        </div>

      </div>

      <button
        type="submit"
        class="reset-password-button"
        [disabled]="form.invalid || form.disabled"
      >
        Reset Password
      </button>

      <p class="login-text">
        Remember your password?

        <button
          type="button"
          (click)="router.navigate(['/login'])"
        >
          Sign In
        </button>

      </p>

    </form>

  </div>

</section>
