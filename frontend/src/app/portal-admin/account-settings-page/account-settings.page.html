<ng-container *ngrxLet="this.adminDetailsSelected$ | async as admin">
  <section class="account">

    <!-- HEADER -->
    <div class="account__header">
      <h1 class="account__title">Account Settings</h1>
      <p class="account__subtitle">
        Manage your administrative profile and security preferences.
      </p>
    </div>

    <!-- PROFILE CARD -->
    <div class="card">

      <div class="card__header">
        <fa-icon [icon]="['fas','user']"></fa-icon>
        <h3 class="card__title">Profile Information</h3>
      </div>

      <form class="card__form" [formGroup]="adminForm">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="fullName"/>
        </div>

        <div class="form-group-row">

          <div class="form-group">
            <label>Username</label>
            <input type="text" formControlName="username"/>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   formControlName="email"/>
          </div>

        </div>

        <div class="card__actions">
          <button
            type="button"
            class="btn btn--primary"
            [disabled]="adminForm.invalid"
            (click)="onUpdate()">
            Save Changes
          </button>
        </div>

      </form>
    </div>

    <!-- SECURITY CARD -->
    <div class="card">

      <div class="card__header">
        <fa-icon [icon]="['fas','shield']"></fa-icon>
        <div>
          <h3 class="card__title">Security</h3>
          <p class="card__subtitle">Manage your account security and authentication methods.</p>
        </div>
      </div>

      <div class="security-item">

        <div class="security-item__info">
          <fa-icon [icon]="['fas','lock']"></fa-icon>

          <div>
            <p class="security-item__title">Password Management</p>
            @if (admin[ADMIN_DETAILS_KEY]?.lastLogin) {
              <small class="security-item__desc">
                Last changed {{ admin[ADMIN_DETAILS_KEY]?.lastLogin }}
              </small>
            }
          </div>
        </div>

        <button type="button"
                (click)="presentUpdatePasswordModal(adminId)"
                class="btn btn--outline">
          Change Password
        </button>

      </div>

    </div>

  </section>

</ng-container>
