<div class="dashboard-container">

  <!-- MOBILE HEADER -->
  <div class="mobile-header">

    <div class="mobile-logo">
      Lebanese University
    </div>

    <div class="hamburger-menu" (click)="toggleSidebar()">
      <fa-icon [icon]="['fas','bars']"></fa-icon>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div
    class="dashboard-container-left-menu left-menu"
    [ngClass]="{ 'mobile-open': isSidebarOpen }">

    <!-- CLOSE BUTTON MOBILE -->
    <div class="mobile-close" (click)="toggleSidebar()">
      <fa-icon [icon]="['fas','times']"></fa-icon>
    </div>

    <!-- TITLE -->
    <div class="left-menu-title">
      <h1>Lebanese University</h1>
    </div>

    <!-- ITEMS -->
    <div class="items">

      <!-- DASHBOARD -->
      <div class="item"
           [routerLink]="['/dashboard']"
           [ngClass]="{ 'active': activeMenu === 'dashboard' }"
           (click)="setActiveMenu('dashboard'); toggleSidebar()">

        <fa-icon [icon]="['fas','chart-line']"></fa-icon>
        <span>Dashboard</span>

      </div>

      <!-- STUDENTS -->
      <div class="item"
           [routerLink]="['/students']"
           [ngClass]="{ 'active': activeMenu === 'students' }"
           (click)="setActiveMenu('students'); toggleSidebar()">

        <fa-icon [icon]="['fas','user-graduate']"></fa-icon>
        <span>Students</span>

      </div>

      <!-- FACULTIES -->
      <div class="item"
           [routerLink]="['/faculties']"
           [ngClass]="{ 'active': activeMenu === 'faculties' }"
           (click)="setActiveMenu('faculties'); toggleSidebar()">

        <fa-icon [icon]="['fas','university']"></fa-icon>
        <span>Faculties</span>

      </div>

    </div>

    <!-- LOGOUT -->
    <div class="logout-button" (click)="logout()">

      <fa-icon [icon]="['fas','sign-out-alt']"></fa-icon>
      <span>Logout</span>

    </div>

  </div>

  <!-- BACKDROP -->
  @if (isSidebarOpen) {
    <div
      class="mobile-backdrop"
      (click)="toggleSidebar()">
    </div>
  }

  <!-- RIGHT CONTENT -->
  <div class="dashboard-container-right">

    <router-outlet></router-outlet>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  © 2026 Lebanese University - Administration Portal
</footer>
