<section class="register">

  <div class="register-card">

    <div class="register-card__header">
      <div class="register-card__icon">
        <fa-icon [icon]="['fas', 'graduation-cap']"></fa-icon>
      </div>

      <h1>Student Registration</h1>
    </div>

    <form
      class="register-card__form"
      [formGroup]="registerForm"
      (ngSubmit)="onRegister()"
    >

      <div class="form-group">
        <label>University Email</label>

        <div class="input-wrapper">
          <fa-icon [icon]="['far', 'envelope']"></fa-icon>

          <input
            type="email"
            placeholder="student@ul.edu.lb"
            formControlName="universityEmail"
          />
        </div>
      </div>

      <div class="form-group">
        <label>University ID Number</label>

        <div class="input-wrapper">
          <fa-icon [icon]="['far', 'id-badge']"></fa-icon>

          <input
            type="text"
            placeholder="e.g. 2024123456"
            formControlName="universityId"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Create Password</label>

        <div class="input-wrapper">
          <fa-icon [icon]="['fas', 'lock']"></fa-icon>

          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            formControlName="password"
            autocomplete="new-password"
          />

          <button
            type="button"
            class="input-wrapper__button"
            (click)="togglePassword()"
          >
            <fa-icon [icon]="['far', showPassword ? 'eye-slash' : 'eye']"></fa-icon>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>

        <div class="input-wrapper">
          <fa-icon [icon]="['fas', 'lock']"></fa-icon>

          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="••••••••"
            formControlName="confirmPassword"
            autocomplete="new-password"
          />

          <button
            type="button"
            class="input-wrapper__button"
            (click)="toggleConfirmPassword()"
          >
            <fa-icon [icon]="['far', showConfirmPassword ? 'eye-slash' : 'eye']"></fa-icon>
          </button>
        </div>
      </div>

      <p class="register-card__terms">
        By signing up, you agree to the University’s electronic
        communication and data processing guidelines.
      </p>

      <button
        type="submit"
        class="register-card__submit"
        [disabled]="registerForm.invalid"
      >
        Sign Up
      </button>

      <p class="register-card__signin">
        Already have an account?
        <button type="button" (click)="navigateToLogin()">Sign In</button>
      </p>

    </form>

  </div>

</section>
